<!doctype html>
<html lang="en" data-theme="">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<meta name="author" content="Aryaman Arora" />

		<!-- Installable web app (Safari / Chrome "Add to Home Screen") -->
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="Jambu" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="theme-color" content="#4a1d4f" />
		<!-- Charis SIL (serif + phonemic) is self-hosted at full Unicode coverage via @font-face in
		     app.css — Google Fonts serves a subset that drops most IPA combining diacritics. Only the
		     UI sans (Inter) is still pulled from Google. -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<script>
			// Apply the saved theme before first paint to avoid a flash.
			try {
				const t = localStorage.getItem('jambu-theme');
				if (t) document.documentElement.setAttribute('data-theme', t);
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
